name: Daily Nifty Shape Mimicry Scanner

on:
  schedule:
    # 11:00 AM IST translates directly to 05:30 AM UTC
    - cron: '30 5 * * 1-5'
  workflow_dispatch: # Allows you to manually click "Run" anytime inside GitHub

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-with-version: '3.10'
          cache: 'pip'

      - name: Install Libraries
        run: |
          pip install pandas numpy requests

      - name: Execute Shape Analysis
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # If using a live broker, feed your API app keys here as secrets:
          # BROKER_API_KEY: ${{ secrets.BROKER_API_KEY }}
        run: python scanner.py
