name: Daily Nifty Shape Mimicry Scanner

on:
  schedule:
    - cron: '30 5 * * 1-5' # Runs at 11:00 AM IST
  workflow_dispatch:

# Grant deployment permissions explicitly for GitHub Pages operations
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  run-scanner-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Removed the cache: 'pip' line to fix the crash

      - name: Install Libraries
        run: pip install pandas numpy requests

      - name: Compute Metrics and Generate Dashboard
        run: python scanner.py

      - name: Setup Web Pages Infrastructure
        uses: actions/configure-pages@v4

      - name: Package HTML Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy Live to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
